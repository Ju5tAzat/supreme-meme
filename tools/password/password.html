<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="password.css">
</head>
<body>
    <a href="../../index.html" class="back-btn">← На главную</a>
    
    <div class="tool-container">
        <div class="tool-header">
            <h1>🔐 Генератор паролей</h1>
            <p>Создайте надёжный пароль</p>
        </div>
        
        <div class="password-generator">
            <div class="password-display">
                <input type="text" id="passwordOutput" readonly placeholder="Нажмите кнопку для генерации">
                <button id="copyBtn" class="copy-btn" title="Копировать">📋</button>
            </div>
            
            <div class="options">
                <div class="option">
                    <label for="length">Длина пароля: <span id="lengthValue">16</span></label>
                    <input type="range" id="length" min="4" max="64" value="16">
                </div>
                
                <div class="option-checkboxes">
                    <label class="checkbox-label">
                        <input type="checkbox" id="uppercase" checked>
                        <span>Заглавные буквы (A-Z)</span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="lowercase" checked>
                        <span>Строчные буквы (a-z)</span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="numbers" checked>
                        <span>Цифры (0-9)</span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="symbols" checked>
                        <span>Спецсимволы (!@#$%)</span>
                    </label>
                </div>
            </div>
            
            <button id="generateBtn" class="generate-btn">Сгенерировать пароль</button>
            
            <div class="strength-meter">
                <div class="strength-bar">
                    <div id="strengthFill" class="strength-fill"></div>
                </div>
                <span id="strengthText">Надёжность: -</span>
            </div>
        </div>
    </div>
    
    <script src="password.js"></script>
</body>
</html>
