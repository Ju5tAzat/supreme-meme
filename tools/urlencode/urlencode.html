<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="urlencode.css">
</head>
<body>
    <div class="tool-container">
        <a href="../../index.html" class="back-btn">← На главную</a>
        
        <div class="tool-header">
            <h1>🔗 URL Encoder/Decoder</h1>
            <p>Кодируйте и декодируйте URL</p>
        </div>

        <div class="url-app">
            <div class="mode-switch">
                <button class="mode-btn active" data-mode="encode">Кодировать</button>
                <button class="mode-btn" data-mode="decode">Декодировать</button>
            </div>

            <div class="input-area">
                <textarea id="inputText" placeholder="Введите URL или текст..."></textarea>
            </div>

            <button id="convertBtn" class="convert-btn">Конвертировать</button>

            <div class="output-area">
                <div class="output-header">
                    <span>Результат</span>
                    <button id="copyBtn">📋 Копировать</button>
                </div>
                <textarea id="outputText" readonly placeholder="Результат"></textarea>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script src="urlencode.js"></script>
</body>
</html>
