<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор случайных чисел</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="randomnumber.css">
</head>
<body>
    <div class="tool-container">
        <a href="../../index.html" class="back-btn">← На главную</a>
        
        <div class="tool-header">
            <h1>🎲 Генератор случайных чисел</h1>
            <p>Генерируйте случайные числа в нужном диапазоне</p>
        </div>

        <div class="random-app">
            <div class="number-display">
                <span id="randomNumber">0</span>
            </div>

            <div class="settings">
                <div class="input-group">
                    <label>От</label>
                    <input type="number" id="minValue" value="1">
                </div>
                <div class="input-group">
                    <label>До</label>
                    <input type="number" id="maxValue" value="100">
                </div>
                <div class="input-group">
                    <label>Количество</label>
                    <input type="number" id="count" value="1" min="1" max="100">
                </div>
            </div>

            <button id="generateBtn" class="generate-btn">Сгенерировать</button>

            <div class="history">
                <h3>История</h3>
                <ul id="historyList"></ul>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script src="randomnumber.js"></script>
</body>
</html>
