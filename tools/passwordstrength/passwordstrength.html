<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка пароля</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="passwordstrength.css">
</head>
<body>
    <div class="tool-container">
        <a href="../../index.html" class="back-btn">← На главную</a>
        
        <div class="tool-header">
            <h1>🔒 Проверка пароля</h1>
            <p>Узнайте насколько надёжен ваш пароль</p>
        </div>

        <div class="password-app">
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Введите пароль">
                <button id="toggleBtn" class="toggle-btn">👁️</button>
            </div>

            <div class="strength-meter">
                <div class="strength-bar">
                    <div id="strengthFill" class="strength-fill"></div>
                </div>
                <span id="strengthText">Введите пароль</span>
            </div>

            <div class="criteria">
                <div class="criteria-item" id="length">
                    <span class="icon">○</span>
                    <span>Минимум 8 символов</span>
                </div>
                <div class="criteria-item" id="uppercase">
                    <span class="icon">○</span>
                    <span>Заглавные буквы (A-Z)</span>
                </div>
                <div class="criteria-item" id="lowercase">
                    <span class="icon">○</span>
                    <span>Строчные буквы (a-z)</span>
                </div>
                <div class="criteria-item" id="numbers">
                    <span class="icon">○</span>
                    <span>Цифры (0-9)</span>
                </div>
                <div class="criteria-item" id="special">
                    <span class="icon">○</span>
                    <span>Спецсимволы (!@#$%)</span>
                </div>
            </div>

            <div class="score-details">
                <h3>Оценка: <span id="scoreValue">0</span>/100</h3>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script src="passwordstrength.js"></script>
</body>
</html>
