<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Часы</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="clock.css">
</head>
<body>
    <a href="../../index.html" class="back-btn">← На главную</a>
    
    <div class="tool-container">
        <div class="tool-header">
            <h1>🕐 Часы</h1>
            <p>Текущее время и дата</p>
        </div>
        
        <div class="clock-app">
            <!-- Цифровые часы -->
            <div class="digital-clock">
                <div class="time-display">
                    <span id="hours">00</span>
                    <span class="colon">:</span>
                    <span id="minutes">00</span>
                    <span class="colon">:</span>
                    <span id="seconds">00</span>
                </div>
                <div class="am-pm" id="amPm"></div>
            </div>
            
            <!-- Аналоговые часы -->
            <div class="analog-clock">
                <svg viewBox="0 0 200 200">
                    <!-- Циферблат -->
                    <circle cx="100" cy="100" r="95" class="clock-face"/>
                    
                    <!-- Часовые метки -->
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(30 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(60 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(90 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(120 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(150 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(180 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(210 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(240 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(270 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(300 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" class="hour-mark" transform="rotate(330 100 100)"/>
                    
                    <!-- Стрелки -->
                    <line id="hourHand" class="hour-hand" x1="100" y1="100" x2="100" y2="50"/>
                    <line id="minuteHand" class="minute-hand" x1="100" y1="100" x2="100" y2="35"/>
                    <line id="secondHand" class="second-hand" x1="100" y1="100" x2="100" y2="25"/>
                    
                    <!-- Центр -->
                    <circle cx="100" cy="100" r="5" class="center-dot"/>
                </svg>
            </div>
            
            <!-- Дата -->
            <div class="date-display">
                <div class="date-full" id="dateFull"></div>
                <div class="date-relative" id="dateRelative"></div>
            </div>
            
            <!-- Мировые часы -->
            <div class="world-clocks">
                <h3>Мировые часы</h3>
                <div class="world-clock-list">
                    <div class="world-clock">
                        <span class="city">Нью-Йорк</span>
                        <span class="world-time" id="nyTime"></span>
                    </div>
                    <div class="world-clock">
                        <span class="city">Лондон</span>
                        <span class="world-time" id="londonTime"></span>
                    </div>
                    <div class="world-clock">
                        <span class="city">Токио</span>
                        <span class="world-time" id="tokyoTime"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="clock.js"></script>
</body>
</html>
