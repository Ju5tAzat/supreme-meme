<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Preview - Инструменты для жизни</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="markdown.css">
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-btn">← На главную</a>
        
        <div class="tool-header">
            <div class="tool-icon">📄</div>
            <h1>Markdown Preview</h1>
            <p>Предпросмотр и редактирование Markdown</p>
        </div>

        <div class="markdown-app">
            <div class="toolbar">
                <button class="toolbar-btn" data-action="bold" title="Жирный (Ctrl+B)"><b>B</b></button>
                <button class="toolbar-btn" data-action="italic" title="Курсив (Ctrl+I)"><i>I</i></button>
                <button class="toolbar-btn" data-action="strikethrough" title="Зачеркнутый"><s>S</s></button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" data-action="h1" title="Заголовок 1">H1</button>
                <button class="toolbar-btn" data-action="h2" title="Заголовок 2">H2</button>
                <button class="toolbar-btn" data-action="h3" title="Заголовок 3">H3</button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" data-action="link" title="Ссылка">🔗</button>
                <button class="toolbar-btn" data-action="image" title="Изображение">🖼️</button>
                <button class="toolbar-btn" data-action="code" title="Код"></></button>
                <button class="toolbar-btn" data-action="codeblock" title="Блок кода">📦</button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" data-action="ul" title="Маркированный список">•</button>
                <button class="toolbar-btn" data-action="ol" title="Нумерованный список">1.</button>
                <button class="toolbar-btn" data-action="quote" title="Цитата">"</button>
                <button class="toolbar-btn" data-action="hr" title="Горизонтальная линия">―</button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" data-action="table" title="Таблица">⊞</button>
            </div>

            <div class="editor-container">
                <div class="editor-pane">
                    <div class="pane-header">
                        <span>Редактор</span>
                        <button class="btn-small" id="clearBtn">Очистить</button>
                    </div>
                    <textarea id="markdownInput" placeholder="Введите Markdown здесь..."># Заголовок 1

## Заголовок 2

Это **жирный текст**, а это *курсивный текст*.

- Маркированный список
- Второй пункт
- Третий пункт

1. Нумерованный список
2. Второй пункт
3. Третий пункт

[Ссылка](https://example.com)

> Это цитата

```
// Блок кода
console.log('Hello, World!');
```

| Заголовок 1 | Заголовок 2 |
|------------|-------------|
| Ячейка 1   | Ячейка 2    |
| Ячейка 3   | Ячейка 4    |
</textarea>
                </div>
                <div class="preview-pane">
                    <div class="pane-header">Предпросмотр</div>
                    <div id="markdownPreview" class="preview-content"></div>
                </div>
            </div>

            <div class="actions">
                <button class="btn-secondary" id="downloadMd">📥 Скачать .md</button>
                <button class="btn-secondary" id="downloadHtml">📥 Скачать .html</button>
                <button class="btn-secondary" id="copyHtml">📋 Копировать HTML</button>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script src="markdown.js"></script>
</body>
</html>
