<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Генератор</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="qrcode.css">
</head>
<body>
    <div class="tool-container">
        <a href="../../index.html" class="back-btn">← На главную</a>
        
        <div class="tool-header">
            <h1>📱 QR Code Генератор</h1>
            <p>Создавайте QR-коды для любого текста или ссылки</p>
        </div>

        <div class="qr-generator">
            <div class="input-group">
                <label for="qr-text">Введите текст или URL:</label>
                <textarea id="qr-text" placeholder="https://example.com или любой текст..." rows="3"></textarea>
            </div>

            <div class="options-row">
                <div class="option-group">
                    <label for="qr-size">Размер:</label>
                    <select id="qr-size">
                        <option value="128">128x128</option>
                        <option value="200" selected>200x200</option>
                        <option value="256">256x256</option>
                        <option value="300">300x300</option>
                        <option value="400">400x400</option>
                        <option value="512">512x512</option>
                    </select>
                </div>
                
                <div class="option-group">
                    <label for="qr-color">Цвет:</label>
                    <input type="color" id="qr-color" value="#000000">
                </div>
                
                <div class="option-group">
                    <label for="qr-bg">Фон:</label>
                    <input type="color" id="qr-bg" value="#ffffff">
                </div>
            </div>

            <div class="button-group">
                <button id="generate-btn">Создать QR-код</button>
                <button id="download-btn" class="secondary">Скачать PNG</button>
                <button id="copy-btn" class="secondary">Копировать</button>
            </div>

            <div id="qr-result" class="qr-result">
                <canvas id="qr-canvas"></canvas>
                <p id="qr-placeholder" class="placeholder">QR-код появится здесь</p>
            </div>
            
            <div id="notification" class="notification-toast"></div>
        </div>

        <div class="history-section">
            <h3>История</h3>
            <div id="history-list" class="history-list"></div>
            <button id="clear-history" class="clear-btn">Очистить историю</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="../../js/main.js"></script>
    <script src="qrcode.js"></script>
</body>
</html>
