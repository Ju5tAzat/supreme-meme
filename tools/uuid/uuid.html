<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="uuid.css">
</head>
<body>
    <div class="tool-container">
        <a href="../../index.html" class="back-btn">← На главную</a>
        
        <div class="tool-header">
            <h1>🆔 UUID Generator</h1>
            <p>Генератор уникальных идентификаторов</p>
        </div>

        <div class="uuid-app">
            <div class="uuid-display">
                <input type="text" id="uuidOutput" readonly placeholder="Нажмите кнопку для генерации">
                <button id="copyBtn" class="copy-btn" title="Копировать">📋</button>
            </div>

            <div class="controls">
                <button id="generateBtn" class="primary-btn">Сгенерировать UUID</button>
                <button id="generate4Btn" class="secondary-btn">v4</button>
                <button id="generate1Btn" class="secondary-btn">v1</button>
            </div>

            <div class="history-section">
                <h3>История</h3>
                <ul id="uuidHistory" class="uuid-history"></ul>
                <button id="clearHistory" class="clear-btn">Очистить</button>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script src="uuid.js"></script>
</body>
</html>
